name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read, pull-requests: write }
jobs:
  lint-type-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "0.5.11", python-version: "3.12.4", enable-cache: true }
      - run: uv sync --all-extras --frozen
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run mypy --strict src/
      - name: Pytest (mocked, 85% coverage)
        env: { ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}, VOYAGE_API_KEY: test_key }
        run: uv run pytest -q --cov=src/compliance_agent --cov-fail-under=85
  eval-smoke:
    if: github.event_name == 'pull_request'
    needs: lint-type-test
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { version: "0.5.11", python-version: "3.12.4", enable-cache: true }
      - run: uv sync --all-extras --frozen
      - name: Eval smoke (15 cases)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
        run: uv run python -m evals.run_eval --limit 15
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: eval-smoke
          message: |
            ### Compliance agent eval (15 cases)
            Gated on false-negative rate ≤ 0.03 and citation coverage = 1.00.
