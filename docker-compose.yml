# Local Qdrant for the rulebook vector index.
#   make qdrant       # start (detached) + wait for ready
#   make qdrant-stop  # stop and remove
# Data persists in the named volume `qdrant_storage` across restarts.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: fsi-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_storage:
