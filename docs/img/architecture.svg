<svg viewBox="0 0 1300 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="ttl">fsi-compliance-agent architecture</title>
  <desc id="desc">Ingress (FastAPI, CLI) into a LangGraph pipeline — triage, hybrid rule retrieval, deterministic sanctions screening, determination, conformal abstain — routing to human review, a Slack approval gate, or close, over external LLM/Qdrant/Slack services and a rulebook, with a cross-cutting hash-chained audit log.</desc>
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
    <style>
      .lane{font-size:11px;font-weight:700;fill:#94a3b8;letter-spacing:1.6px}
      .nt{font-weight:600;font-size:13.5px;text-anchor:middle}
      .ns{font-size:11px;text-anchor:middle}
      .edge{stroke:#64748b;stroke-width:1.6;fill:none;marker-end:url(#arw)}
      .tie{stroke:#cbd5e1;stroke-width:1.4;stroke-dasharray:3 4;fill:none}
      .elbl{font-size:10.5px;fill:#64748b;text-anchor:middle}
      .leg{font-size:12px;fill:#475569}
    </style>
  </defs>

  <rect x="6" y="6" width="1288" height="508" rx="16" fill="#ffffff" stroke="#e6e9ef"/>

  <text x="32" y="44" font-size="22" font-weight="700" fill="#0f172a">fsi-compliance-agent</text>
  <text x="32" y="66" font-size="13" fill="#64748b">Citation-grounded compliance review — deterministic controls wrap the LLM, not the other way around.</text>

  <!-- lane labels -->
  <text x="32" y="104" class="lane">INGRESS</text>
  <text x="196" y="104" class="lane">PIPELINE · LangGraph StateGraph</text>
  <text x="1044" y="104" class="lane">ROUTING</text>

  <!-- ingress -->
  <g filter="url(#sh)">
    <rect x="32" y="116" width="146" height="50" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="32" y="178" width="146" height="50" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <text class="nt" x="105" y="140" fill="#1e293b">FastAPI</text>
  <text class="ns" x="105" y="157" fill="#64748b">/review · /audit</text>
  <text class="nt" x="105" y="202" fill="#1e293b">CLI</text>
  <text class="ns" x="105" y="219" fill="#64748b">make review</text>

  <!-- pipeline cards -->
  <g filter="url(#sh)">
    <rect x="196" y="116" width="150" height="58" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="366" y="116" width="150" height="58" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="536" y="116" width="150" height="58" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="706" y="116" width="150" height="58" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text class="nt" x="271" y="142" fill="#312e81">triage</text>
  <text class="ns" x="271" y="159" fill="#4f46e5">type · risk tier</text>
  <text class="nt" x="441" y="142" fill="#312e81">rule_retrieval</text>
  <text class="ns" x="441" y="159" fill="#4f46e5">hybrid RRF</text>
  <text class="nt" x="611" y="142" fill="#312e81">sanctions screen</text>
  <text class="ns" x="611" y="159" fill="#4f46e5">watchlist match</text>
  <text class="nt" x="781" y="142" fill="#312e81">determination</text>
  <text class="ns" x="781" y="159" fill="#4f46e5">decision + citations</text>

  <!-- abstain decision diamond -->
  <g filter="url(#sh)">
    <path d="M916 103 L970 145 L916 187 L862 145 Z" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
  </g>
  <text class="nt" x="916" y="142" fill="#9f1239" font-size="12.5">abstain?</text>
  <text class="ns" x="916" y="158" fill="#e11d48">conformal τ</text>

  <!-- routing cards -->
  <g filter="url(#sh)">
    <rect x="1044" y="110" width="216" height="44" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="1044" y="162" width="216" height="44" rx="10" fill="#fff1f2" stroke="#fb7185" stroke-width="1.5"/>
    <rect x="1044" y="214" width="216" height="44" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text class="nt" x="1152" y="131" fill="#1e293b">human review</text>
  <text class="ns" x="1152" y="147" fill="#64748b">low confidence → abstain</text>
  <text class="nt" x="1152" y="183" fill="#9f1239">approval_gate</text>
  <text class="ns" x="1152" y="199" fill="#e11d48">Slack HITL · high-risk flag</text>
  <text class="nt" x="1152" y="235" fill="#312e81">close</text>
  <text class="ns" x="1152" y="251" fill="#4f46e5">final decision</text>

  <!-- spine edges -->
  <path class="edge" d="M178 137 L196 137"/>
  <path class="edge" d="M178 203 L190 203 Q196 203 196 197 L196 158"/>
  <path class="edge" d="M346 145 L366 145"/>
  <path class="edge" d="M516 145 L536 145"/>
  <path class="edge" d="M686 145 L706 145"/>
  <path class="edge" d="M856 145 L862 145"/>
  <!-- abstain to routing -->
  <path class="edge" d="M962 137 Q1010 132 1010 132 L1044 132"/>
  <path class="edge" d="M970 145 L1044 184"/>
  <path class="edge" d="M962 153 Q1010 236 1010 236 L1044 236"/>
  <text class="elbl" x="1006" y="120">low conf</text>
  <text class="elbl" x="1002" y="171">flag</text>
  <text class="elbl" x="1004" y="250">clear / flag</text>
  <!-- approval_gate to close -->
  <path class="edge" d="M1260 184 q24 0 24 26 q0 26 -24 26"/>

  <!-- data & services -->
  <text x="32" y="300" class="lane">DATA &amp; SERVICES</text>
  <g filter="url(#sh)">
    <rect x="32"  y="310" width="146" height="46" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <rect x="196" y="310" width="146" height="46" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <rect x="360" y="310" width="146" height="46" rx="10" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <rect x="524" y="310" width="146" height="46" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="688" y="310" width="146" height="46" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="852" y="310" width="146" height="46" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text class="nt" x="105" y="332" fill="#065f46">LLM</text>
  <text class="ns" x="105" y="348" fill="#059669">OpenAI · Anthropic</text>
  <text class="nt" x="269" y="332" fill="#065f46">Qdrant</text>
  <text class="ns" x="269" y="348" fill="#059669">vector store</text>
  <text class="nt" x="433" y="332" fill="#065f46">Slack</text>
  <text class="ns" x="433" y="348" fill="#059669">approvals channel</text>
  <text class="nt" x="597" y="332" fill="#92400e">rules.jsonl</text>
  <text class="ns" x="597" y="348" fill="#b45309">46 AML rules</text>
  <text class="nt" x="761" y="332" fill="#92400e">watchlist.jsonl</text>
  <text class="ns" x="761" y="348" fill="#b45309">16 parties</text>
  <text class="nt" x="925" y="332" fill="#92400e">calibration τ</text>
  <text class="ns" x="925" y="348" fill="#b45309">α = 0.05</text>

  <!-- service ties (dotted) -->
  <path class="tie" d="M271 174 L150 310"/>
  <path class="tie" d="M441 174 L300 310"/>
  <path class="tie" d="M611 174 L735 310"/>
  <path class="tie" d="M781 174 L630 310"/>
  <path class="tie" d="M916 187 L915 310"/>

  <!-- audit footer -->
  <g filter="url(#sh)">
    <rect x="32" y="386" width="1228" height="46" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  </g>
  <rect x="52" y="400" width="14" height="12" rx="2" fill="none" stroke="#475569" stroke-width="1.6"/>
  <path d="M55 400 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#475569" stroke-width="1.6"/>
  <text x="80" y="414" font-size="13" font-weight="600" fill="#1e293b">Hash-chained audit log</text>
  <text x="262" y="414" font-size="13" fill="#475569">— every node appends · tamper-evident · GET /audit/case/{id} → Markdown examiner report</text>

  <!-- legend -->
  <g transform="translate(32,456)">
    <rect x="0" y="-10" width="13" height="13" rx="3" fill="#eef2ff" stroke="#6366f1"/><text class="leg" x="20" y="1">pipeline node</text>
    <rect x="132" y="-10" width="13" height="13" rx="3" fill="#fff1f2" stroke="#fb7185"/><text class="leg" x="152" y="1">decision</text>
    <rect x="232" y="-10" width="13" height="13" rx="3" fill="#ecfdf5" stroke="#34d399"/><text class="leg" x="252" y="1">external service</text>
    <rect x="382" y="-10" width="13" height="13" rx="3" fill="#fffbeb" stroke="#fbbf24"/><text class="leg" x="402" y="1">rulebook / control</text>
    <rect x="546" y="-10" width="13" height="13" rx="3" fill="#f8fafc" stroke="#64748b"/><text class="leg" x="566" y="1">audit</text>
    <text class="leg" x="660" y="1" font-style="italic" fill="#475569">Contracts: cite-or-invalid · conformal abstention · approval gate · tamper-evident audit</text>
  </g>
</svg>
